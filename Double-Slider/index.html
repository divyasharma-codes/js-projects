<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double-Verticle-Slider</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="slider-container">
        <div class="left-slide">
             <div style="background-color: #FFB866">
                <h1>Flying Eagle</h1>
                <p>in the seaaa</p>
            </div>
            <div style="background-color:#252E33">
                <h1>Wonderful Castle</h1>
                <p>in the wilderness</p>
            </div>
            <div style="background-color:#2A86BA">
                <h1>Bluuue Sky</h1>
                <p>in the skyyyy</p>
            </div>
            <div style="background-color:#ED3555">
                <h1>Nature Flower</h1>
                <p>all in pinkkk</p>
            </div>
           
        </div>

        <div class="right-slide">
            <div style="background-image: url(images/flower.jpg);"></div>
            <div style="background-image: url(images/blue-sky.jpg);"></div>
            <div style="background-image: url(images/castle.jpg);"></div>
            <div style="background-image: url(images/eagle.jpg);"></div>
        </div>

        <div class="action-buttons">
            <button class="down-button">
                <i class="fas fa-arrow-down"></i>
            </button>
            <button class="up-button">
                <i class="fas fa-arrow-up"></i>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
